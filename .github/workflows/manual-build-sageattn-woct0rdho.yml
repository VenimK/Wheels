name: Manual Build - SageAttention (woct0rdho) Linux

on:
  workflow_dispatch:
    inputs:
      sage_branch:
        description: 'Branch/tag to build'
        required: true
        default: 'head_dim_256'
      pytorch_version:
        description: 'PyTorch version (e.g., 2.10.0)'
        required: true
        default: '2.10.0'
      cuda_version:
        description: 'CUDA version (e.g., 12.8.1)'
        required: true
        default: '12.8.1'
      python_version:
        description: 'Python version for build'
        required: true
        default: '3.10'
      release_tag:
        description: 'GitHub release tag to upload to'
        required: true
        default: 'sageattention-woct0rdho-linux'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '${{ github.event.inputs.python_version }}'

      - name: Normalize CUDA version
        id: cuda
        run: |
          full='${{ github.event.inputs.cuda_version }}'
          short=$(echo "$full" | cut -d. -f1,2)
          short_nodot=$(echo "$short" | tr -d '.')
          echo "full=$full" >> "$GITHUB_OUTPUT"
          echo "short=$short" >> "$GITHUB_OUTPUT"
          echo "short_nodot=$short_nodot" >> "$GITHUB_OUTPUT"

      - name: Install CUDA
        uses: Jimver/cuda-toolkit@v0.2.24
        with:
          cuda: '${{ steps.cuda.outputs.full }}'
          method: network

      - name: Build wheel
        env:
          SAGE_BRANCH: '${{ github.event.inputs.sage_branch }}'
          PYTORCH_VERSION: '${{ github.event.inputs.pytorch_version }}'
          CUDA_VERSION: '${{ steps.cuda.outputs.short }}'
          CUDA_VERSION_SHORT_NODOT: '${{ steps.cuda.outputs.short_nodot }}'
          PYTHON_VERSION: '${{ github.event.inputs.python_version }}'
        run: bash .github/scripts/build_sageattention_woct0rdho_linux.sh

      - name: Rename wheel for Linux
        run: |
          ls -R sageattn-src/dist/
          mkdir -p upload
          cp sageattn-src/dist/*.whl upload/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: '${{ github.event.inputs.release_tag }}'
          files: upload/*.whl
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

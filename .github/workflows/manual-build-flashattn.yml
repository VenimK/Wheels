name: Manual Flash Attention Builder

on:
  workflow_dispatch:
    inputs:
      flash_attn_version:
        description: 'Flash Attention version (e.g., 2.5.9.post1 or "latest")'
        required: true
        type: string
        default: 'latest'
      python_version:
        description: 'Python version (e.g., 3.13)'
        required: true
        type: string
        default: '3.13'
      torch_version:
        description: 'PyTorch version (e.g., 2.9.0)'
        required: true
        type: string
        default: '2.9.0'
      cuda_version:
        description: 'CUDA version (e.g., 13.0)'
        required: true
        type: string
        default: '13.0'

jobs:
  build-wheel:
    name: Build Flash Attention Wheel (Linux)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ github.event.inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ github.event.inputs.python_version }}

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.24
        with:
          cuda: ${{ github.event.inputs.cuda_version }}.0

      - name: Install build dependencies
        run: |
          python -m pip install -U setuptools wheel packaging ninja
          sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build and Rename wheel
        id: build_wheel
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x .github/scripts/build_flash_attention_linux.sh
          .github/scripts/build_flash_attention_linux.sh \
            "${{ github.event.inputs.flash_attn_version }}" \
            "${{ github.event.inputs.python_version }}" \
            "${{ github.event.inputs.torch_version }}" \
            "${{ github.event.inputs.cuda_version }}"

      - name: Test wheel installation
        shell: bash
        run: |
          pip install --no-cache-dir "${{ steps.build_wheel.outputs.wheel_path }}"
          python -c "import flash_attn; print('Successfully imported flash_attn version:', flash_attn.__version__)"

      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: flash-attention-linux-wheel
          path: ${{ steps.build_wheel.outputs.wheel_path }}
